<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Award balance sim</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #0d1528;
        color: #f0e6d3;
        padding: 1.25rem;
        line-height: 1.45;
      }
      pre {
        white-space: pre-wrap;
        max-width: 52rem;
      }
    </style>
  </head>
  <body>
    <pre id="out">Running award-balance simulation…</pre>
    <script type="module">
      import { Game, CHARACTERS, GAME_CONFIG } from './js/game.js?v=rebal1';
      import { playBotActions } from './js/bot.js?v=rebal1';

      const avg = (arr) =>
        arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
      const stdev = (arr) => {
        if (arr.length < 2) return 0;
        const m = avg(arr);
        return Math.sqrt(
          arr.reduce((s, x) => s + (x - m) * (x - m), 0) / (arr.length - 1)
        );
      };
      const pct = (n, d) => (d ? ((100 * n) / d).toFixed(1) + '%' : '—');

      function runGame(charIds, awardsPerAirline) {
        const prev = GAME_CONFIG.awardsPerAirlinePerRound;
        GAME_CONFIG.awardsPerAirlinePerRound = awardsPerAirline;

        const g = new Game();
        g.startGame(
          charIds.map((id, i) => ({
            characterId: id,
            name: `Bot ${id}`,
            isBot: true,
          }))
        );

        let flights = 0;
        let awardDenies = 0;
        let hotels = 0;
        let raceClaims = 0;
        let privateTickets = 0;
        const airlineBookings = { united: 0, delta: 0, american: 0 };
        // Patch addLog to count events (non-invasive)
        const origLog = g.addLog.bind(g);
        g.addLog = (msg) => {
          if (/flies /.test(msg)) {
            flights += 1;
            if (/on united/.test(msg)) airlineBookings.united += 1;
            else if (/on delta/.test(msg)) airlineBookings.delta += 1;
            else if (/on american/.test(msg)) airlineBookings.american += 1;
          }
          if (/No .* award tickets left|no award tickets/i.test(msg)) {
            awardDenies += 1;
          }
          if (/stays 1n/.test(msg)) hotels += 1;
          if (/claims RACE/.test(msg)) raceClaims += 1;
          if (/completes ordered trip/.test(msg)) privateTickets += 1;
          return origLog(msg);
        };

        // Also count denied flights from bot try/catch by wrapping bookFlight
        const origBook = g.bookFlight.bind(g);
        g.bookFlight = (...args) => {
          try {
            return origBook(...args);
          } catch (e) {
            if (/award tickets left/i.test(e.message)) awardDenies += 1;
            throw e;
          }
        };

        let guard = 0;
        while (g.phase === 'playing' && guard++ < 800) {
          playBotActions(g);
          g.consumeFlightAnims();
          const res = g.endTurn();
          if (res.gameOver) break;
        }

        GAME_CONFIG.awardsPerAirlinePerRound = prev;

        const snap = g.snapshot();
        const scores = (snap.finalScores || []).map((s) => {
          const p = g.players.find((x) => x.id === s.id);
          return {
            character: s.character,
            vp: s.vp,
            cities: s.cities,
            segments: s.segments,
            nights: p ? p.nights : 0,
            ticketsDone: p ? (p.completedTickets || []).length : 0,
          };
        });

        const vps = scores.map((s) => s.vp);
        const spread = Math.max(...vps) - Math.min(...vps);

        return {
          scores,
          flights,
          hotels,
          raceClaims,
          privateTickets,
          awardDenies,
          airlineBookings,
          spread,
          avgVp: avg(vps),
        };
      }

      function summarizeBatch(label, games, playerCount, awardsPerAirline) {
        const ids = CHARACTERS.map((c) => c.id);
        const allVp = [];
        const byChar = {};
        let flights = 0;
        let hotels = 0;
        let races = 0;
        let priv = 0;
        let denies = 0;
        let spreads = [];
        const air = { united: 0, delta: 0, american: 0 };
        // Real flight cap = Travel actions = players × rounds
        const travelCapPerGame =
          playerCount * (GAME_CONFIG.maxRounds || 10);
        const awardCapPerGame =
          awardsPerAirline * 3 * (GAME_CONFIG.maxRounds || 10);

        for (let i = 0; i < games; i++) {
          const pick = [];
          for (let j = 0; j < playerCount; j++) {
            pick.push(ids[(i + j * 2) % ids.length]);
          }
          // unique chars only
          const uniq = [...new Set(pick)];
          while (uniq.length < playerCount) {
            for (const id of ids) {
              if (!uniq.includes(id)) uniq.push(id);
              if (uniq.length >= playerCount) break;
            }
          }
          const r = runGame(uniq.slice(0, playerCount), awardsPerAirline);
          flights += r.flights;
          hotels += r.hotels;
          races += r.raceClaims;
          priv += r.privateTickets;
          denies += r.awardDenies;
          spreads.push(r.spread);
          air.united += r.airlineBookings.united;
          air.delta += r.airlineBookings.delta;
          air.american += r.airlineBookings.american;
          for (const s of r.scores) {
            allVp.push(s.vp);
            byChar[s.character] = byChar[s.character] || [];
            byChar[s.character].push(s.vp);
          }
        }

        const lines = [
          `═══ ${label} ═══`,
          `Games: ${games} × ${playerCount} bots | awards/airline/round = ${awardsPerAirline}`,
          `VP: avg ${avg(allVp).toFixed(1)} ± ${stdev(allVp).toFixed(1)}  range ${Math.min(
            ...allVp
          )}–${Math.max(...allVp)}`,
          `Winner margin (max−min VP/game): avg ${avg(spreads).toFixed(1)}`,
          `Per game: flights ${(flights / games).toFixed(1)} · hotels ${(
            hotels / games
          ).toFixed(1)} · private tix ${(priv / games).toFixed(1)} · races ${(
            races / games
          ).toFixed(1)}`,
          `Travel-cap flights/game (1 Travel×players×rounds): ${travelCapPerGame}`,
          `Award-cap flights/game (awards×3 airlines×rounds): ${awardCapPerGame}`,
          `Flights vs travel-cap: ${pct(flights, travelCapPerGame * games)} · vs award-cap: ${pct(
            flights,
            awardCapPerGame * games
          )}`,
          `Award-cap / travel-cap ratio: ${(
            awardCapPerGame / travelCapPerGame
          ).toFixed(2)}× ( >1 means awards usually looser than action economy)`,
          `Hard deny throws: ${denies} total · ${(denies / games).toFixed(2)}/game (bots avoid sold-out, so low)`,
          `Airline mix: UA ${pct(air.united, flights)} · DL ${pct(
            air.delta,
            flights
          )} · AA ${pct(air.american, flights)}`,
          '',
          'By character (avg VP):',
        ];
        const rows = Object.entries(byChar)
          .map(([ch, arr]) => ({
            ch,
            n: arr.length,
            avg: avg(arr),
            sd: stdev(arr),
            min: Math.min(...arr),
            max: Math.max(...arr),
          }))
          .sort((a, b) => b.avg - a.avg);
        const top = rows[0]?.avg || 1;
        for (const r of rows) {
          const gap = (((r.avg - top) / top) * 100).toFixed(0);
          lines.push(
            `  ${r.ch.padEnd(16)} n=${r.n}  avg=${r.avg.toFixed(1).padStart(5)}  ±${r.sd
              .toFixed(0)
              .padStart(3)}  [${r.min}-${r.max}]  ${gap}% vs lead`
          );
        }
        lines.push('');
        return { lines, allVp, byChar, flights, denies, spreads, rows };
      }

      const out = [];
      out.push('Points Odyssey — award rule balance sim');
      out.push(
        `Base config: rounds=${GAME_CONFIG.maxRounds} raceBonus=${GAME_CONFIG.raceGoalBonusVp} budget=$${GAME_CONFIG.budgetPerTurn}`
      );
      out.push('');

      // Current rule: 2 per airline, 3p and 4p tables
      const a = summarizeBatch('CURRENT: 2 awards/airline · 3 players', 36, 3, 2);
      out.push(...a.lines);

      const b = summarizeBatch('CURRENT: 2 awards/airline · 4 players', 24, 4, 2);
      out.push(...b.lines);

      // Comparison configs
      const c = summarizeBatch('COMPARE: 1 award/airline · 3 players', 24, 3, 1);
      out.push(...c.lines);

      const d = summarizeBatch('COMPARE: 3 awards/airline · 3 players', 24, 3, 3);
      out.push(...d.lines);

      // Verdict
      out.push('═══ BALANCE NOTES ═══');
      const charSpread = (batch) => {
        if (!batch.rows.length) return 0;
        return batch.rows[0].avg - batch.rows[batch.rows.length - 1].avg;
      };
      out.push(
        `Character gap (best−worst avg VP) @2 awards/3p: ${charSpread(a).toFixed(1)}`
      );
      out.push(
        `Character gap @2 awards/4p: ${charSpread(b).toFixed(1)}`
      );
      out.push(
        `Award deny rate @2/3p: ${(a.denies / 36).toFixed(2)}/game | @1/3p: ${(
          c.denies / 24
        ).toFixed(2)}/game | @3/3p: ${(d.denies / 24).toFixed(2)}/game`
      );
      out.push(
        `Flights/game @2: ${(a.flights / 36).toFixed(1)} | @1: ${(
          c.flights / 24
        ).toFixed(1)} | @3: ${(d.flights / 24).toFixed(1)}`
      );

      // With 1 Travel/turn, award inventory only binds if players pile on one airline
      // or player count is high. Compare award-cap to travel-cap:
      const ratio2 = (2 * 3 * 10) / (3 * 10); // 2.0 for 3p
      const ratio2_4p = (2 * 3 * 10) / (4 * 10); // 1.5
      const ratio1 = (1 * 3 * 10) / (3 * 10); // 1.0
      out.push(
        `Capacity: @2 awards/3p award-cap is ${ratio2.toFixed(1)}× travel-cap (loose unless everyone flies same airline).`
      );
      out.push(
        `         @2 awards/4p award-cap is ${ratio2_4p.toFixed(1)}× travel-cap (mildly tight).`
      );
      out.push(
        `         @1 award/3p award-cap equals travel-cap (binding if any airline skew).`
      );
      out.push(
        `Observed flights @2/3p ${(a.flights / 36).toFixed(
          1
        )}/game ≈ same as @3 (${(d.flights / 24).toFixed(
          1
        )}) — inventory above 2 does not add flights; @1 cuts to ${(
          c.flights / 24
        ).toFixed(1)}.`
      );
      out.push(
        a.flights / 36 - c.flights / 24 > 4
          ? 'RECOMMEND: keep 2 for 3p tables; consider 1 for 5–6p or if humans always stack United.'
          : 'RECOMMEND: 1/airline if you want constant contention; 2 is fine as soft race when paths collide.'
      );

      const bal =
        charSpread(a) > 50
          ? 'Character spread is WIDE (>50 VP) — Foodie/hotels vs Executive is a bigger issue than awards.'
          : charSpread(a) > 30
            ? 'Character spread is MODERATE — acceptable for themed kits.'
            : 'Character spread is TIGHT — good parity.';
      out.push(bal);

      const text = out.join('\n');
      document.getElementById('out').textContent = text;
      console.log(text);
    </script>
  </body>
</html>
