<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <!-- Top-down airliner, nose points +X (right). Wide swept wings clearly visible. -->
  <g>
    <!-- Main wings (wide diamond sweep) -->
    <path
      d="M70 50
         L28 8
         L38 14
         L78 42
         L118 42
         L78 50
         L118 58
         L78 58
         L38 86
         L28 92
         Z"
      fill="#1a2744"
      stroke="#d4a017"
      stroke-width="1.8"
      stroke-linejoin="round"
    />
    <!-- Wing gold leading-edge accent -->
    <path d="M32 12 L74 44" stroke="#d4a017" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M32 88 L74 56" stroke="#d4a017" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- Fuselage -->
    <ellipse
      cx="88" cy="50"
      rx="52" ry="12"
      fill="#f7f4ee"
      stroke="#d4a017"
      stroke-width="1.8"
    />
    <!-- Cabin stripe -->
    <rect x="55" y="46" width="58" height="8" rx="4" fill="#117aca" opacity="0.35"/>
    <!-- Windows -->
    <circle cx="118" cy="50" r="2.4" fill="#117aca"/>
    <circle cx="108" cy="50" r="2.4" fill="#117aca"/>
    <circle cx="98" cy="50" r="2.4" fill="#117aca"/>
    <circle cx="88" cy="50" r="2.4" fill="#117aca"/>
    <circle cx="78" cy="50" r="2.4" fill="#117aca"/>
    <circle cx="68" cy="50" r="2.4" fill="#117aca"/>

    <!-- Nose cone -->
    <path d="M136 50 L156 50 L138 43 L138 57 Z" fill="#d4a017"/>
    <ellipse cx="136" cy="50" rx="6" ry="9" fill="#f7f4ee" stroke="#d4a017" stroke-width="1"/>

    <!-- Engines under wings -->
    <ellipse cx="62" cy="30" rx="11" ry="5" fill="#c4b8a0" stroke="#1a2744" stroke-width="1"/>
    <ellipse cx="62" cy="70" rx="11" ry="5" fill="#c4b8a0" stroke="#1a2744" stroke-width="1"/>
    <rect x="68" y="27" width="8" height="6" rx="1" fill="#1a2744"/>
    <rect x="68" y="67" width="8" height="6" rx="1" fill="#1a2744"/>

    <!-- Horizontal stabilizers (tail) -->
    <path
      d="M30 50 L12 34 L18 50 L12 66 Z"
      fill="#1a2744"
      stroke="#d4a017"
      stroke-width="1.4"
      stroke-linejoin="round"
    />
    <!-- Vertical fin (top view as small diamond) -->
    <path d="M22 50 L14 50 L18 40 L26 48 Z" fill="#117aca" stroke="#d4a017" stroke-width="1"/>
  </g>
</svg>
